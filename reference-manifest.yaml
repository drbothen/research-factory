# Reference manifest — source-of-truth for rebuilding .reference/ on a new system.
# DEVIATION (documented): the brownfield-ingest target is THIS repo's own engine,
# which is permanent and version-controlled in-place. No external clone is made;
# analyzers read directly from plugins/research-factory/. There is nothing to
# re-download — the "source" is the working tree itself.
repos:
  - name: research-factory
    url: "in-repo (github.com/drbothen/research-factory)"
    commit: "9ced663"          # main HEAD at ingest start
    ingested: "2026-06-01"
    depth: full
    in_place_path: "plugins/research-factory/"
    design_context:
      - "BUILD-PLAN.md"
      - "README.md"
      - "CLAUDE.md"
      - "CHANGELOG.md"
    focus: >
      The research-factory engine: domain-agnostic GitHub-Actions-backed research
      pipeline shipping as a Claude Code plugin. Ingested to feed spec crystallization
      for continuing roadmap items #4 (L6 portfolio) and #5 (engine release).
    status: ingesting
