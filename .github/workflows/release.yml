name: release

# Tag-driven release. Validates the plugin/marketplace manifests agree on version,
# runs the full test suite, then cuts a GitHub Release. (Marketplace publish is v1.0.)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install bats + jq
        run: sudo apt-get update && sudo apt-get install -y bats jq

      - name: Install yq (mikefarah v4)
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Manifest versions agree
        run: |
          mv=$(jq -r '.plugins[0].version' .claude-plugin/marketplace.json)
          pv=$(jq -r '.version' plugins/research-factory/.claude-plugin/plugin.json)
          echo "marketplace=$mv plugin=$pv"
          [ "$mv" = "$pv" ] || { echo "::error::version mismatch ($mv vs $pv)"; exit 1; }

      - name: Run plugin test suite
        run: bash plugins/research-factory/tests/run-all.sh

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" --generate-notes --title "${GITHUB_REF_NAME}"
