# weekly-maintenance.yml — weekly hygiene sweep (installed into an instance's .github/workflows/).
# Claude runs the maintenance workflow (consistency audit + editorial sweep + dashboard rebuild)
# and opens a PR with the fixes. Human merges (autonomy 3).
#
# ⚠ Build-time: confirm claude-code-action input keys + plugin-enable (BUILD-PLAN §8 ⚠).
name: weekly-maintenance
on:
  schedule:
    - cron: "0 8 * * 1"     # Mondays 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write          # required by claude-code-action (OIDC)

jobs:
  maintenance:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - name: Claude — consistency + editorial sweep + dashboard rebuild
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          plugin_marketplaces: |
            https://github.com/drbothen/research-factory.git
          plugins: |
            research-factory@research-factory
          claude_args: "--model claude-haiku-4-5-20251001"
          prompt: |
            Run the research-factory maintenance workflow: consistency-validator sweep (fresh
            context — broken links, count drift vs seed/canonical-values.md, layer tags) +
            editorial-sweep across the corpus + dashboard-builder regeneration. Open a PR with
            the fixes. DO NOT merge.

      # --- audit: persist the full Claude conversation/execution log ---
      - name: Upload Claude execution log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-execution-log-${{ github.run_id }}
          path: ${{ steps.claude.outputs.execution_file }}
          if-no-files-found: warn
          retention-days: 30
      - name: Summarize what Claude did
        if: always()
        run: |
          {
            echo "### Maintenance run summary"
            echo "- session_id: \`${{ steps.claude.outputs.session_id }}\`"
            echo "- branch_name: \`${{ steps.claude.outputs.branch_name }}\`  ← empty = no commit"
            echo "- full conversation log: artifact \`claude-execution-log-${{ github.run_id }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
