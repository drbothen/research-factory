# ingest.yml — source intake (installed into an instance's .github/workflows/).
# When a source URL/file is dropped in seed/inbox/, Claude drafts the L1/L2 observation with
# citations via the ingest-source workflow and opens a PR. Cross-family review fires on PR open.
#
# ⚠ Build-time: confirm claude-code-action input keys + plugin-enable (BUILD-PLAN §8 ⚠).
name: ingest
on:
  push:
    paths: ["seed/inbox/**"]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write          # required by claude-code-action (OIDC)

jobs:
  ingest-source:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Claude builder — ingest the new source (L1/L2)
        id: claude
        uses: anthropics/claude-code-action@v1
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          plugin_marketplaces: |
            https://github.com/drbothen/research-factory.git
          plugins: |
            research-factory@research-factory
          claude_args: >-
            --model claude-sonnet-4-6
            --mcp-config .github/mcp.json
            --allowedTools "mcp__perplexity__*,mcp__tavily__*,Read,Write,Edit,MultiEdit,Bash,Glob,Grep,Task,WebFetch,WebSearch"
          prompt: |
            New source(s) landed in seed/inbox/. Run the research-factory ingest-source workflow:
            capture → quarantine-fetch → draft the L1/L2 observation with a citation on every
            claim (or an explicit [Source needed]/[Access required] flag) → editorial-sweep →
            citation-verify → adversary loop (capped at convergence.max_passes, default 6) →
            state-manager. Loop to an adversary PASS, or stop at the cap if it will not converge —
            never grind unbounded. Commit either way; if you exit on the cap, FLAG the PR title
            "[DID NOT CONVERGE: M MUST-FIX]" and say so in the body. Open a PR. DO NOT merge.

      # --- audit: persist the full Claude conversation/execution log ---
      - name: Upload Claude execution log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-execution-log-${{ github.run_id }}
          path: ${{ steps.claude.outputs.execution_file }}
          if-no-files-found: warn
          retention-days: 30
      - name: Summarize what Claude did
        if: always()
        run: |
          {
            echo "### Ingest run summary"
            echo "- session_id: \`${{ steps.claude.outputs.session_id }}\`"
            echo "- branch_name: \`${{ steps.claude.outputs.branch_name }}\`  ← empty = no commit"
            echo "- full conversation log: artifact \`claude-execution-log-${{ github.run_id }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
