# nightly-research.yml — the night shift (installed into an instance's .github/workflows/).
# Claude Code (the builder) advances ONE open work-item/track through build-track and opens a
# PR. It NEVER auto-merges at autonomy 3 — claude-code-action returns a branch + PR link, and a
# human merges in the morning. Cross-family review fires via on-pr-review.yml when the PR opens.
#
# ⚠ Build-time: confirm claude-code-action input keys + plugin-enable in CI (BUILD-PLAN §8 ⚠).
name: nightly-research
on:
  schedule:
    - cron: "0 7 * * *"     # daily 07:00 UTC
  workflow_dispatch:
    inputs:
      track:
        description: "Track slug to advance (optional; default = next open work-item)"
        required: false

permissions:
  contents: write
  pull-requests: write
  id-token: write          # required by claude-code-action (OIDC)

jobs:
  advance:
    runs-on: ubuntu-latest
    timeout-minutes: 120     # bounded — one track/work-item, not the whole corpus (§12.2)
    steps:
      - uses: actions/checkout@v4
      - name: Claude builder — run build-track on the next work-item
        id: claude
        uses: anthropics/claude-code-action@v1
        env:
          # search-tool MCP keys — expanded by ${VAR} in .github/mcp.json (never hardcoded)
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # NO github_token override → the action uses the Claude GitHub App token, which has
          # workflows:write (verified on the 1898andCo install) and CAN push branches whose range
          # touches .github/workflows/. GITHUB_TOKEN cannot — that was the blocked-push root cause.
          # The App token also triggers on-pr-review when Claude opens the PR (GITHUB_TOKEN would not).
          # Enable the engine plugin natively (verified input keys); engine repo is public.
          plugin_marketplaces: |
            https://github.com/drbothen/research-factory.git
          plugins: |
            research-factory@research-factory
          # --mcp-config enables the search tools; --allowedTools must permit them + file writes
          claude_args: >-
            --model claude-sonnet-4-6
            --mcp-config .github/mcp.json
            --allowedTools "mcp__perplexity__*,mcp__tavily__*,Read,Write,Edit,MultiEdit,Bash,Glob,Grep,Task,WebFetch,WebSearch"
          prompt: |
            Run the research-factory build-track skill on ${{ github.event.inputs.track || 'the next open work-item in WORK-BACKLOG / STATE.md' }}.
            Draft/advance → editorial-sweep → citation-verify → adversary loop to PASS → state-manager.
            When the loop reaches an adversary PASS, COMMIT the changes to a new branch named
            claude/<track>-<short-desc>, push it, then OPEN A PR with:
              gh pr create --base main --head <that-branch> --title "Night shift: <track>" --body "<short summary + 'Human merges (autonomy 3)'>"
            Do NOT merge. If you make NO changes, say so explicitly and open no PR/branch.
            Surface anything needing human judgment.
          # show_full_output left OFF — it can echo tool results (incl. secrets) into the run log.
          # The full conversation is captured the safe way: the claude-execution-log artifact below.

      # --- audit: persist the full Claude conversation/execution log (not a black box) ---
      - name: Upload Claude execution log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-execution-log-${{ github.run_id }}
          path: ${{ steps.claude.outputs.execution_file }}
          if-no-files-found: warn
          retention-days: 30
      - name: Summarize what the night shift did
        if: always()
        run: |
          {
            echo "### Night-shift run summary"
            echo "- session_id: \`${{ steps.claude.outputs.session_id }}\`"
            echo "- (note: claude-code-action branch_name is empty when Claude pushes via Bash — see the detected branch below)"
            echo "- full conversation log: artifact \`claude-execution-log-${{ github.run_id }}\` (resume with --resume <session_id>)"
          } >> "$GITHUB_STEP_SUMMARY"

      # Fallback PR opener. Claude opens the PR itself via the App token (which triggers on-pr-review).
      # This step is a safety net: detect the branch Claude pushed (branch_name output is empty for
      # manual Bash pushes) and ensure a PR exists. It runs even if Claude's own gh pr create didn't.
      - name: Ensure a PR exists for Claude's branch
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TRACK="${{ github.event.inputs.track || '' }}"
          BR=$(git ls-remote --heads origin "refs/heads/claude/${TRACK}*" | sed 's|.*refs/heads/||' | sort | tail -1)
          if [ -z "$BR" ]; then
            echo "No claude/${TRACK}* branch on remote — Claude made no committable change, or the push failed."
            exit 0
          fi
          echo "Detected pushed branch: $BR"
          if [ -n "$(gh pr list --repo "${{ github.repository }}" --head "$BR" --json number -q '.[0].number')" ]; then
            echo "PR already open for $BR (Claude opened it via the App token)."
            exit 0
          fi
          gh pr create --repo "${{ github.repository }}" --head "$BR" --base main \
            --title "Night shift: ${TRACK:-work-item}" \
            --body "Automated build-track run (adversary PASS). Human merges — autonomy 3. Conversation log: artifact claude-execution-log-${{ github.run_id }}." \
            || echo "PR may already exist for $BR"
